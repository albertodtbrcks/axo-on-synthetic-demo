resources:
  quality_monitors:
    mon_fact_orders:
      table_name: ${var.catalog}.${var.schema}.fact_orders
      assets_dir: /Users/alberto.ramirez@databricks.com/axo_monitoring/fact_orders
      output_schema_name: ${var.catalog}.${var.schema}
      time_series:
        timestamp_col: order_timestamp
        granularities:
          - "1 hour"
          - "1 day"
      slicing_exprs:
        - sales_channel
        - payment_method

    mon_products_silver:
      table_name: ${var.catalog}.${var.schema}.products_silver
      assets_dir: /Users/alberto.ramirez@databricks.com/axo_monitoring/products_silver
      output_schema_name: ${var.catalog}.${var.schema}
      snapshot: {}

    mon_predicciones_devolucion:
      table_name: ${var.catalog}.${var.schema}.predicciones_devolucion
      assets_dir: /Users/alberto.ramirez@databricks.com/axo_monitoring/predicciones
      output_schema_name: ${var.catalog}.${var.schema}
      inference_log:
        timestamp_col: order_ts
        granularities:
          - "1 hour"
          - "1 day"
        model_id_col: model_id
        prediction_col: prediction_label
        label_col: label
        problem_type: PROBLEM_TYPE_CLASSIFICATION
